<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'Connors Glack GAC — Facilities Calendar</title>
<style>
:root{
  --M:#8a1e3e;--Md:#6e1530;--N:#0b1624;--S:#7ec8e3;--S2:#5ab4d8;
  --BR:rgba(126,200,227,0.13);--T:#e8edf5;--P:#0e1826;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  height:100vh;background:var(--N);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--T);display:flex;flex-direction:column;overflow:hidden;
}

/* ── HEADER ── */
header{
  background:linear-gradient(90deg,var(--Md),var(--M));
  padding:12px 18px;display:flex;align-items:center;gap:12px;
  border-bottom:3px solid var(--S2);flex-shrink:0;
}
header img{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));}
.ht{font-family:Impact,"Arial Black",sans-serif;font-size:18px;letter-spacing:2px;color:#fff;line-height:1;}
.hs{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:2px;}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;align-items:center;gap:8px;padding:8px 18px;
  background:rgba(11,22,36,.8);border-bottom:1px solid var(--BR);
  flex-shrink:0;font-size:11px;color:rgba(232,237,245,.4);
}
.status-dot{width:8px;height:8px;border-radius:50%;background:#fde047;flex-shrink:0;transition:background .3s;}

/* ── FILTER BAR ── */
.filter-bar{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  border-bottom:1px solid var(--BR);flex-shrink:0;flex-wrap:wrap;
  background:rgba(8,15,26,.5);
}
.filter-title{
  font-family:Impact,"Arial Black",sans-serif;font-size:14px;
  letter-spacing:2px;color:#fff;margin-right:4px;white-space:nowrap;
}
.ftbtn{
  padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;border-radius:4px;cursor:pointer;
  border:1px solid rgba(126,200,227,.15);
  background:rgba(255,255,255,.04);color:rgba(232,237,245,.45);
  transition:all .2s;white-space:nowrap;
}
.ftbtn.active{background:rgba(126,200,227,.15);border-color:rgba(126,200,227,.4);color:#7ec8e3;}
.wksel{
  background:rgba(255,255,255,.06);border:1px solid rgba(126,200,227,.2);
  border-radius:4px;color:rgba(232,237,245,.7);
  font-size:10px;font-weight:700;letter-spacing:1px;
  padding:5px 10px;cursor:pointer;
  -webkit-appearance:none;appearance:none;
  max-width:155px;font-family:inherit;
}
.wksel option{background:#0e1826;color:#e8edf5;}
.vbtn{
  padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;border-radius:4px;cursor:pointer;
  border:1px solid rgba(255,255,255,.08);
  background:transparent;color:rgba(232,237,245,.35);transition:all .2s;
}
.vbtn.active{background:rgba(126,200,227,.1);border-color:rgba(126,200,227,.25);color:#7ec8e3;}
.fcount{font-size:11px;color:rgba(232,237,245,.3);margin-left:auto;white-space:nowrap;}

/* ── LIST VIEW ── */
.list-view{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;min-height:0;}

/* Day cards */
.cal-day{background:rgba(255,255,255,.03);border:1px solid rgba(126,200,227,.1);border-radius:8px;overflow:visible;}
.cal-day-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:rgba(126,200,227,.05);
  border-bottom:1px solid rgba(126,200,227,.07);
}
.cal-day-date{font-family:Impact,"Arial Black",sans-serif;font-size:13px;color:#fff;letter-spacing:1px;}
.cal-day-count{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(126,200,227,.5);text-transform:uppercase;}

/* Event rows — single line */
.cal-event{
  display:flex;align-items:center;
  padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.04);
  gap:8px;
}
.cal-event:last-child{border-bottom:none;}
.ev-title{font-size:12px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.ev-time{font-size:11px;color:rgba(232,237,245,.4);white-space:nowrap;flex-shrink:0;}

/* Facility badges */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;white-space:nowrap;}
.badge.main-pitch    {background:rgba(34,197,94,.18);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
.badge.training-pitch{background:rgba(167,139,250,.18);color:#c4b5fd;border:1px solid rgba(167,139,250,.3);}
.badge.gym           {background:rgba(236,72,153,.18);color:#f9a8d4;border:1px solid rgba(236,72,153,.3);}
.badge.clubhouse     {background:rgba(56,189,248,.18);color:#7ec8e3;border:1px solid rgba(56,189,248,.3);}
.badge.st-finloughs  {background:rgba(234,179,8,.18);color:#fde047;border:1px solid rgba(234,179,8,.3);}

.empty{text-align:center;color:rgba(232,237,245,.25);font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:60px 20px;line-height:2.2;}

/* ── WEEK GRID VIEW ── */
.week-view{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0;}
.week-view.active{display:flex;}
.week-nav{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--BR);flex-shrink:0;}
.week-nav-btn{
  background:rgba(255,255,255,.06);border:1px solid var(--BR);
  border-radius:4px;color:var(--T);cursor:pointer;
  font-size:18px;line-height:1;padding:4px 14px;
}
.week-lbl{font-family:Impact,"Arial Black",sans-serif;font-size:14px;letter-spacing:2px;color:#fff;flex:1;text-align:center;}
.week-cols{flex:1;display:grid;grid-template-columns:repeat(7,1fr);overflow-y:auto;border-top:1px solid var(--BR);}
.week-col{border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;}
.week-col:last-child{border-right:none;}
.week-col-hdr{padding:8px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.week-col-day{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(232,237,245,.4);text-transform:uppercase;}
.week-col-date{font-family:Impact,"Arial Black",sans-serif;font-size:20px;color:#fff;line-height:1.1;}
.week-col-date.today{color:#7ec8e3;}
.week-events{flex:1;padding:4px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
.week-event{border-radius:4px;padding:4px 6px;font-size:10px;line-height:1.4;}
.week-event.main-pitch    {background:rgba(34,197,94,.15);border-left:3px solid #4ade80;color:#d1fae5;}
.week-event.training-pitch{background:rgba(167,139,250,.15);border-left:3px solid #c4b5fd;color:#ede9fe;}
.week-event.gym           {background:rgba(236,72,153,.15);border-left:3px solid #f9a8d4;color:#fce7f3;}
.week-event.clubhouse     {background:rgba(56,189,248,.15);border-left:3px solid #7ec8e3;color:#e0f2fe;}
.week-event.st-finloughs  {background:rgba(234,179,8,.15);border-left:3px solid #fde047;color:#fef9c3;}

/* Spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(126,200,227,.2);border-top-color:#7ec8e3;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <img id="crest" src="" alt="Crest">
  <div>
    <div class="ht">O'Connors Glack GAC</div>
    <div class="hs">Facilities Calendar</div>
  </div>
</header>

<div class="status-bar">
  <div class="status-dot" id="sdot"></div>
  <span id="stxt"><span class="spinner"></span>Connecting to database...</span>
</div>

<div class="filter-bar">
  <div class="filter-title">Club Calendar</div>
  <button class="ftbtn active" id="cf-week"  onclick="setFilter('week')">This Week</button>
  <button class="ftbtn"        id="cf-nweek" onclick="setFilter('nextweek')">Next Week</button>
  <select class="wksel" id="cf-wksel" onchange="setFilter('pickweek')">
    <option value="">Week beginning...</option>
  </select>
  <button class="ftbtn"        id="cf-month" onclick="setFilter('month')">This Month</button>
  <button class="ftbtn"        id="cf-all"   onclick="setFilter('all')">All Upcoming</button>
  <div class="fcount" id="fcount"></div>
  <button class="vbtn active" id="vbtn-list" onclick="setView('list')">&#9776; List</button>
  <button class="vbtn"        id="vbtn-week" onclick="setView('week')">&#9783; Week</button>
</div>

<div class="list-view" id="list-view">
  <div class="empty" id="list-placeholder"><span class="spinner"></span> Loading bookings...</div>
</div>

<div class="week-view" id="week-view">
  <div class="week-nav">
    <button class="week-nav-btn" onclick="weekNav(-1)">&#8249;</button>
    <div class="week-lbl" id="week-lbl"></div>
    <button class="week-nav-btn" onclick="weekNav(1)">&#8250;</button>
  </div>
  <div class="week-cols" id="week-cols"></div>
</div>

<script>
var SB_URL="https://xgkmhqkrsrtjlniaduhi.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhna21ocWtyc3J0amxuaWFkdWhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTI1NzUsImV4cCI6MjA5MjI4ODU3NX0.IPeyCnh2FGmTvkRajB8w810aB398XaPL4LC0mtsrrQ8";
var ALL=[], FILTER='week', VIEW='list', WOFF=0;
var DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var FAC={
  'Main Pitch':           {c:'main-pitch',     l:'Main Pitch'},
  'Main Pitch (Half)':    {c:'main-pitch',     l:'Half Pitch'},
  'Training Pitch':       {c:'training-pitch', l:'Training'},
  'Training Pitch (Half)':{c:'training-pitch', l:'Half Training'},
  'Clubhouse':            {c:'clubhouse',      l:'Clubhouse'},
  'Gym':                  {c:'gym',            l:'Gym'},
  'St Finloughs Hall':    {c:'st-finloughs',   l:'St Finloughs'}
};
function fc(f){return(FAC[f]&&FAC[f].c)||'clubhouse';}
function fl(f){return(FAC[f]&&FAC[f].l)||f;}
function pad(n){return String(n).padStart(2,'0');}
function dk(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtT(t){
  if(!t)return'';
  var p=t.slice(0,5).split(':'),hr=parseInt(p[0]),mi=p[1];
  return(hr===0?12:hr>12?hr-12:hr)+':'+mi+(hr>=12?'pm':'am');
}
function weekRange(off){
  var n=new Date(),dy=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-(dy===0?6:dy-1)+((off||0)*7));
  m.setHours(0,0,0,0);
  var e=new Date(m);e.setDate(m.getDate()+6);e.setHours(23,59,59,999);
  return{s:m,e:e};
}
function buildWeekDrop(){
  var sel=document.getElementById('cf-wksel');
  if(!sel||sel.options.length>1)return;
  var n=new Date(),dy=n.getDay();
  var start=new Date(n);
  start.setDate(n.getDate()-(dy===0?6:dy-1)-28);
  start.setHours(0,0,0,0);
  for(var d=new Date(start),i=0;i<60;i++,d.setDate(d.getDate()+7)){
    var key=dk(new Date(d));
    var opt=document.createElement('option');
    opt.value=key;
    opt.textContent='w/b '+pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();
    sel.appendChild(opt);
  }
}
function getFiltered(){
  var n=new Date();n.setHours(0,0,0,0);
  var tm=n.toISOString().slice(0,7);
  return ALL.filter(function(b){
    var d=new Date(b.date+'T00:00:00');
    if(FILTER==='week')    {var r=weekRange(0);return d>=r.s&&d<=r.e;}
    if(FILTER==='nextweek'){var r=weekRange(1);return d>=r.s&&d<=r.e;}
    if(FILTER==='month')   return b.date.slice(0,7)===tm;
    if(FILTER==='pickweek'){
      var s=document.getElementById('cf-wksel');
      var v=s?s.value:'';
      if(!v)return false;
      var ws=new Date(v+'T00:00:00'),we=new Date(ws);
      we.setDate(ws.getDate()+6);we.setHours(23,59,59,999);
      return d>=ws&&d<=we;
    }
    return d>=n;
  });
}
function setFilter(f){
  FILTER=f;
  if(f==='nextweek')WOFF=1; else if(f==='week')WOFF=0;
  ['week','nweek','month','all'].forEach(function(b){
    var el=document.getElementById('cf-'+b);
    if(el)el.classList.toggle('active',b===f||(b==='nweek'&&f==='nextweek'));
  });
  if(f!=='pickweek'){var ws=document.getElementById('cf-wksel');if(ws)ws.value='';}
  render();
}
function setView(v){
  VIEW=v;
  document.getElementById('list-view').style.display=v==='list'?'flex':'none';
  document.getElementById('week-view').classList.toggle('active',v==='week');
  document.getElementById('vbtn-list').classList.toggle('active',v==='list');
  document.getElementById('vbtn-week').classList.toggle('active',v==='week');
  render();
}
function render(){VIEW==='week'?renderWeek():renderList();}
function renderList(){
  var lv=document.getElementById('list-view');
  var ct=document.getElementById('fcount');
  var f=getFiltered();
  f.sort(function(a,b){return(a.date+(a.start_time||'')).localeCompare(b.date+(b.start_time||''));});
  if(ct)ct.textContent=f.length+' booking'+(f.length!==1?'s':'');
  lv.innerHTML='';
  if(!f.length){
    var m={week:'No bookings this week',nextweek:'No bookings next week',month:'No bookings this month',all:'No upcoming bookings',pickweek:'No bookings for selected week'};
    lv.innerHTML='<div class="empty">&#128197;<br>'+(m[FILTER]||'No bookings')+'</div>';
    return;
  }
  var byDate={};
  f.forEach(function(b){if(!byDate[b.date])byDate[b.date]=[];byDate[b.date].push(b);});
  Object.keys(byDate).sort().forEach(function(key){
    var bks=byDate[key];
    var d=new Date(key+'T00:00:00');
    var disp=DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
    var dayEl=document.createElement('div');
    dayEl.className='cal-day';
    var hdr=document.createElement('div');
    hdr.className='cal-day-hdr';
    hdr.innerHTML='<div class="cal-day-date">'+disp+'</div>'+
      '<div class="cal-day-count">'+bks.length+' booking'+(bks.length!==1?'s':'')+'</div>';
    dayEl.appendChild(hdr);
    bks.forEach(function(b){
      var ev=document.createElement('div');
      ev.className='cal-event';
      var t=(b.start_time&&b.end_time)?fmtT(b.start_time)+' – '+fmtT(b.end_time):(b.start_time?fmtT(b.start_time):'');
      ev.innerHTML=
        '<span class="badge '+fc(b.facility)+'">'+fl(b.facility)+'</span>'+
        '<span class="ev-title">'+(b.activity||'')+'</span>'+
        (t?'<span class="ev-time">'+t+'</span>':'');
      dayEl.appendChild(ev);
    });
    lv.appendChild(dayEl);
  });
}
function renderWeek(){
  var wc=document.getElementById('week-cols');
  var lbl=document.getElementById('week-lbl');
  var wr=weekRange(WOFF);
  var days=[];
  for(var i=0;i<7;i++){var d=new Date(wr.s);d.setDate(wr.s.getDate()+i);days.push(d);}
  var s=days[0],e=days[6];
  if(lbl)lbl.textContent=s.getDate()+' '+MONTHS[s.getMonth()]+' – '+e.getDate()+' '+MONTHS[e.getMonth()]+' '+e.getFullYear();
  var today=new Date();today.setHours(0,0,0,0);
  wc.innerHTML='';
  days.forEach(function(d){
    var key=dk(d);
    var isT=d.getTime()===today.getTime();
    var bks=ALL.filter(function(b){return b.date===key;});
    bks.sort(function(a,b){return(a.start_time||'').localeCompare(b.start_time||'');});
    var col=document.createElement('div');
    col.className='week-col';
    col.innerHTML=
      '<div class="week-col-hdr">'+
        '<div class="week-col-day">'+DAYS[d.getDay()].toUpperCase()+'</div>'+
        '<div class="week-col-date'+(isT?' today':'')+'">'+d.getDate()+'</div>'+
      '</div>'+
      '<div class="week-events" id="we-'+key+'"></div>';
    wc.appendChild(col);
    var ec=col.querySelector('.week-events');
    if(!bks.length){
      ec.innerHTML='<div style="font-size:10px;color:rgba(232,237,245,.12);text-align:center;padding:8px 0">–</div>';
    } else {
      bks.forEach(function(b){
        var we=document.createElement('div');
        we.className='week-event '+fc(b.facility);
        var t=b.start_time?fmtT(b.start_time)+(b.end_time?'–'+fmtT(b.end_time):''):'';
        we.innerHTML='<div style="font-weight:700;font-size:10px">'+(b.activity||'')+'</div>'+(t?'<div style="opacity:.7;font-size:9px">'+t+'</div>':'');
        ec.appendChild(we);
      });
    }
  });
}
function weekNav(dir){WOFF+=dir;renderWeek();}
function setStatus(s){
  var dot=document.getElementById('sdot');
  var txt=document.getElementById('stxt');
  if(s==='ok'){
    dot.style.background='#4ade80';
    txt.textContent=ALL.length+' booking'+(ALL.length!==1?'s':'')+' loaded';
  } else if(s==='loading'){
    dot.style.background='#fde047';
    txt.innerHTML='<span class="spinner"></span>Loading...';
  } else {
    dot.style.background='#e07090';
    txt.textContent='Connection error — please refresh';
  }
}
function load(){
  setStatus('loading');
  fetch(SB_URL+'/rest/v1/bookings?select=*&order=date.asc,start_time.asc',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    ALL=Array.isArray(data)?data:[];
    setStatus('ok');
    buildWeekDrop();
    render();
  }).catch(function(err){
    setStatus('error');
    document.getElementById('list-view').innerHTML=
      '<div class="empty">&#128683; Could not load bookings.<br>Please refresh the page.</div>';
    console.error(err);
  });
}
// Set crest image
